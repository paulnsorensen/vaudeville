name: Bug Report
description: Report unexpected behavior in Vaudeville
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check the [Troubleshooting section](https://github.com/paulnsorensen/vaudeville#troubleshooting) in the README.

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - MLX (Apple Silicon)
        - GGUF (x86_64 / Linux)
        - Unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Vaudeville version
      placeholder: "e.g. 0.1.0 — run: uv run vaudeville --version"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Rule YAML used (or "bundled rule X")
        2. Hook event that fired
        3. What the daemon logged
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste from `~/.vaudeville/logs/events.jsonl` or daemon stderr.
      render: text
