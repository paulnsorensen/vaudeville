name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

env:
  UV_PYTHON: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install

      - run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy vaudeville/

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            uv-sync-args: "--group dev --group gguf"
          - os: macos-15
            uv-sync-args: "--group dev --group mlx"
          - os: ubuntu-24.04-arm
            uv-sync-args: "--group dev --group gguf"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install

      - run: uv sync ${{ matrix.uv-sync-args }}

      - name: Run tests
        run: uv run pytest

  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install

      - run: uv sync --group dev

      - name: Smoke — session-start.sh
        run: |
          # Create both possible model cache paths so the script won't early-exit
          # regardless of which backend session-start.sh selects for this platform.
          mkdir -p "${HOME}/.cache/huggingface/hub/models--microsoft--Phi-4-mini-instruct-gguf"
          mkdir -p "${HOME}/.cache/huggingface/hub/models--mlx-community--Phi-4-mini-instruct-4bit"
          bash hooks/session-start.sh < /dev/null
          RUNTIME_DIR="/tmp/vaudeville-$(id -u)"
          test -d "${RUNTIME_DIR}"

      - name: Smoke — runner.py fail-open
        run: |
          python3 hooks/runner.py --event Stop < tests/fixtures/stop-hook-input.json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install

      - name: Build wheel
        run: uv build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
