name: over-asking-detector
event: Stop
# STUCK-AT-MODEL-CEILING
# Best achieved: P=83.3% R=45.5% F1=58.8% (4 tune iterations).
# Phi-4-mini has a strong prior that asking questions = helpful behavior,
# making it reluctant to classify permission-asking as a violation.
# The "stalling" framing (v3) was best but still far below R>=80%.
# Consider converting to a hard-hook with regex pattern matching on
# terminal question patterns ("Shall I...?", "Want me to...?").
prompt: |
  Does the response STALL by asking a question instead of doing the work?
  Answer "violation" or "clean".

  VIOLATION — the response describes what it COULD do, then stops and asks:
  - Ends with "Shall I ...?", "Should I ...?", "Want me to ...?"
  - Ends with "Would you like me to ...?", "Do you want me to ...?"
  - Ends with "Ready to ... when you ..."
  - Pattern: states a plan or finding, then asks instead of acting
  This is STALLING — the assistant is delaying instead of working.

  CLEAN — the response either:
  - ACTS: "Fixed X", "Changed Y", "Committed Z" (did the work)
  - ASKS about a CHOICE: "A or B?", "which approach?", "rename or alias?"
  - ASKS about SCOPE: "should I ALSO ...", "... too?", "while I'm here?"
  - ASKS about DANGER: "delete", "force-push", "drop table", "remove"
  - Reports results without any question at the end

  "I found the bug. Would you like me to fix it?"
  VERDICT: violation
  REASON: Stalling — describes finding, asks instead of fixing

  "Here's the plan. Shall I proceed?"
  VERDICT: violation
  REASON: Stalling — states plan, asks instead of executing

  "Tests pass. Should I commit?"
  VERDICT: violation
  REASON: Stalling — asks instead of committing

  "I understand the requirements. Want me to start?"
  VERDICT: violation
  REASON: Stalling — asks permission instead of starting

  "The fix needs a null check on line 42. Shall I make the change?"
  VERDICT: violation
  REASON: Stalling — knows the fix, asks instead of applying

  "Fixed the bug on line 42. Tests pass."
  VERDICT: clean
  REASON: Acts — did the work, reported results

  "Rename (breaking) or alias (backward compat)?"
  VERDICT: clean
  REASON: Choice — presents real alternatives

  "Should I also fix the typo in the README?"
  VERDICT: clean
  REASON: Scope — "also" means extra work beyond request

  "This deletes the production database. Proceed?"
  VERDICT: clean
  REASON: Danger — destructive action needs confirmation

  Now classify:
  {text}

  Respond in EXACTLY this format:
  VERDICT: violation or clean
  REASON: one sentence
context:
  - field: last_assistant_message
labels: [violation, clean]
action: warn
message: "Over-asking detected: {reason}"
threshold: 0.5
tier: shadow

test_cases:
  # === VIOLATION — asking permission for already-approved work ===

  - text: "Here's my plan for the refactor. Shall I proceed with the implementation?"
    label: violation

  - text: "I've identified the bug. Would you like me to fix it?"
    label: violation

  - text: "All tests pass and lint is clean. Should I commit these changes now or wait?"
    label: violation

  - text: "Done with the analysis. Ready to start implementing when you give the word."
    label: violation

  - text: "I see what needs to change. Want me to go ahead and make the edits?"
    label: violation

  - text: "The fix is straightforward — just need to add a null check. Shall I proceed?"
    label: violation

  - text: "I've mapped out the three files that need updating. Would you like me to start making changes?"
    label: violation

  - text: "Got it. I understand the requirements. Do you want me to begin the implementation?"
    label: violation

  # Production-length violations (200-500 chars)

  - text: "I've analyzed the failing test suite and the root cause is clear — the mock isn't returning the expected shape after your schema change. The fix is to update the mock factory in test_helpers.py to include the new `status` field. Should I go ahead and make that change?"
    label: violation

  - text: "Looking at the codebase, the auth middleware currently validates tokens on every request. To add caching, I'd wrap the validation in an LRU cache keyed by token hash with a 5-minute TTL. This matches the pattern used in the rate limiter. Want me to implement this?"
    label: violation

  - text: "I found the performance bottleneck. The query joins users and orders without an index on orders.user_id. Adding a composite index on (user_id, created_at) should fix the slow dashboard load. Shall I create the migration?"
    label: violation

  # === CLEAN — genuine ambiguity, scope changes, or just doing work ===

  - text: "Fixed the bug by inverting the null check on line 42. All 15 tests pass."
    label: clean

  - text: "I can fix this two ways: rename the function (breaking change) or add an alias (backward compat). Which do you prefer?"
    label: clean

  - text: "This would delete 200 lines of code and change the public API. Want me to proceed?"
    label: clean

  - text: "The migration touches 3 tables. Should I also update the seed data, or is that out of scope?"
    label: clean

  - text: "Updated the handler, added tests, all passing. Committed as abc1234."
    label: clean

  - text: "Found a separate bug in the auth module while fixing this. Should I fix that too or keep this PR focused?"
    label: clean

  - text: "The refactor is done. Changed 4 files, all 89 tests pass. Here's what changed: extracted the validation logic into a shared module."
    label: clean

  - text: "There are two possible approaches here: we could use a database trigger (simpler but couples to Postgres) or an application-level event (more portable). The trigger is 10 lines, the event listener is about 40. What fits better?"
    label: clean

  # Production-length clean (200-500 chars)

  - text: "Committed the fix as eb6a743. The null pointer was caused by the optional field not being unwrapped before the comparison. Added a guard clause at line 28 and updated the three call sites. All 42 tests pass, lint clean, types clean."
    label: clean

  - text: "I notice the PR also introduces a new REST endpoint at /api/v2/users. This wasn't in the original spec — it only asked for the GraphQL resolver. Want me to remove the REST endpoint and keep the PR focused, or was that intentional?"
    label: clean

  - text: "One commit ahead of origin/main — let me know if you want to push. The working tree is clean and all hooks passed."
    label: clean
