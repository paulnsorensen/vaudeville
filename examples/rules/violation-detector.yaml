name: violation-detector
event: Stop
prompt: |
  Classify the AI assistant response as "violation" or "clean".

  VIOLATION if the response contains ANY of:
  - Hedging: "should work", "might", "probably", "may want to" about code
  - Deferral: "TODO", "will do later", "as a starting point", "for now"
  - Unresolved findings: "Score:", "confidence:", or "WARN:" reporting a problem
  - A scorecard row with "FAIL" in it
  - Telling the user to verify something the assistant should have done

  CLEAN if the response:
  - Reports passing tests with specific numbers
  - Completed work with specifics (file names, commit refs)
  - Scorecard rows all say "PASS"
  - TALKS ABOUT the enforcement/scoring system (hooks, self-eval,
    classifiers, predicates, "scored below", "rejected")
  - Review tables with action columns (FIX, PUSH BACK)

  Response: "Score: 90 — clones full Arc on every call."
  VERDICT: violation
  REASON: Unresolved finding

  Response: "WARN: scored 73 but no action taken. Unresolved."
  VERDICT: violation
  REASON: WARN with unresolved finding

  Response: "This might work. Tests should pass now."
  VERDICT: violation
  REASON: Hedging without running tests

  Response: "All 42 tests pass. Fix handles null pointer."
  VERDICT: clean
  REASON: Specific test count

  Response: "Changed to violation language detected which matches the predicate."
  VERDICT: clean
  REASON: Talking about the detection system itself

  Response: "All candidates scored below 50, not surfaced."
  VERDICT: clean
  REASON: Describing scoring system behavior

  Response: "| 1 | 92 | BUG | auth.ts:42 | Missing null check | FIX |"
  VERDICT: clean
  REASON: Review table with action column — triaged

  Now classify:
  {text}

  Respond in EXACTLY this format:
  VERDICT: violation or clean
  REASON: one sentence
context:
  - field: last_assistant_message
labels: [violation, clean]
action: block
message: "Quality violation: {reason}"
threshold: 0.3
tier: warn
