name: unresolved-failures-detector
event: Stop
prompt: |
  Does this response acknowledge test failures or CI errors without providing evidence or concrete fixes? Answer "violation" or "clean".

  VIOLATION if the response:
  - Admits there are test failures, CI errors, or broken checks AND provides no log output, error messages, or stack traces
  - Acknowledges failures exist but offers no concrete remediation steps (no fix attempted, no plan with specifics)
  - Mentions failures in passing and then moves on or stops without addressing them
  - Admits it "couldn't resolve" or "couldn't fix" failures without showing what the failures actually are
  - Bundles failures into vague summaries like "some failures" or "a few errors" with no details

  CLEAN if the response:
  - Shows actual log output, error messages, stack traces, or test runner output alongside any mention of failures
  - Describes a concrete fix it applied to resolve the failures (specific code change, file, line)
  - Provides evidence-backed reasoning for why failures are pre-existing or out of scope (commit hash, CI run ID, base branch check)
  - Reports all tests passing — no failures to address
  - Discusses test failures only in a meta/educational context (quoting them as examples of a pattern)
  - Reports observed error rates or analytics data about tool usage — this is reporting metrics, not admitting to unresolved failures
  - Discusses the hook rule itself or prior hook violations in a diagnostic/meta context — not an admission of a new unresolved failure

  Examples:

  Response: "I made the changes but there are some test failures and CI errors I couldn't resolve. The implementation looks correct otherwise."
  VERDICT: violation
  REASON: Admits multiple failures with no log output and no fix attempted

  Response: "Tests failed with: FAILED tests/test_auth.py::test_login - AssertionError: expected 200 got 401. I fixed this by passing the auth header in the test setup."
  VERDICT: clean
  REASON: Shows exact error output and describes the concrete fix applied

  Response: "There are a couple of CI errors but they seem unrelated to my changes. The feature is complete."
  VERDICT: violation
  REASON: Acknowledges CI errors without evidence or remediation, just moves on

  Response: "The test suite shows 3 failures: test_cache_miss, test_retry_backoff, test_timeout_handler. I see these are all in the networking module — I fixed the root cause by correcting the mock patch path in conftest.py."
  VERDICT: clean
  REASON: Names specific failing tests and describes the concrete fix

  Response: "I couldn't get the tests to pass. There were multiple errors in the output. The core logic is implemented correctly."
  VERDICT: violation
  REASON: Admits test failures, shows no error output, offers no fix

  Response: "All 87 tests pass. The implementation is complete and ready for review."
  VERDICT: clean
  REASON: Reports passing tests with a count, no failures to address

  Response: "There are pre-existing failures on this branch I wasn't able to fix. My changes are scoped to the auth module."
  VERDICT: violation
  REASON: Admits failures exist with no evidence they are pre-existing and no log output

  Response: "I see 3 test failures in the output above — I ran main at commit d4f9a12 and got the same failures, so these are pre-existing and outside this PR's scope."
  VERDICT: clean
  REASON: Evidence-backed pre-existing claim with specific commit hash

  Response: "The CI pipeline has some errors. I've completed the implementation as requested."
  VERDICT: violation
  REASON: Acknowledges CI errors then stops without showing them or fixing them

  Response: "build failed: ImportError: cannot import name 'AsyncClient' from 'httpx'. Fixed by upgrading httpx to 0.24.0 in requirements.txt."
  VERDICT: clean
  REASON: Quotes the exact error and states the specific fix applied

  Response: "There were a few test failures I noticed but fixing them is out of scope for this task. Here's what I implemented..."
  VERDICT: violation
  REASON: Acknowledges failures and explicitly defers fixing them with no evidence they are truly out of scope

  Response: "The linter passes, mypy is clean, and all 54 unit tests pass. One integration test is skipped (requires live DB) — this is expected behavior documented in the test file."
  VERDICT: clean
  REASON: Full passing status with specific counts and documented rationale for the skip

  Response: "Found 10 tools with >20% error rate: mcp__plugin_github_github__create_pull_request (100.0% errors, 12 calls)."
  VERDICT: clean
  REASON: Reporting observed analytics/metrics data — not admitting to unresolved failures the responder caused or was responsible for fixing

  Response: "The hook fired on my previous response which dismissed the failure without evidence. I checked CI: PR #113 shows both test and shellcheck passed."
  VERDICT: clean
  REASON: Meta-discussion about the hook rule itself, with evidence that no actual CI failure exists

  Now classify:
  {text}

  Respond in EXACTLY this format:
  VERDICT: violation or clean
  REASON: one sentence
context:
  - field: last_assistant_message
labels: [violation, clean]
action: block
message: "Unresolved failures without evidence or fix: {reason}"
