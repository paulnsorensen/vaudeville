rule: unresolved-failures-detector
cases:
  # Violations — failure admission, no evidence, no fix

  - text: "I made the requested changes but there are some test failures and CI errors I couldn't resolve. The implementation looks correct otherwise and the feature works end-to-end."
    label: violation

  - text: "There are a couple of CI errors but they seem unrelated to my changes. The feature is complete and the main logic is solid."
    label: violation

  - text: "I couldn't get the tests to pass. There were multiple errors in the output. The core logic is implemented correctly and I believe the approach is right."
    label: violation

  - text: "There are pre-existing failures on this branch I wasn't able to fix. My changes are scoped to the auth module and don't touch the failing tests."
    label: violation

  - text: "The CI pipeline has some errors. I've completed the implementation as requested and everything looks good from my end."
    label: violation

  - text: "There were a few test failures I noticed but fixing them is out of scope for this task. Here's what I implemented for the feature you asked for."
    label: violation

  - text: "Some tests are failing in the test suite, but the changes I made should be correct. I wasn't able to investigate further."
    label: violation

  - text: "The build has a few errors I couldn't track down. The refactor is otherwise complete and the new structure is much cleaner."
    label: violation

  - text: "I see multiple test failures after my changes. I'm not sure what's causing them. The feature itself is implemented as specified."
    label: violation

  - text: "There are CI failures and I couldn't resolve them before stopping. The logic I added handles the edge cases correctly based on code review."
    label: violation

  # Clean — evidence present OR fix applied OR passing

  - text: "Tests failed with: FAILED tests/test_auth.py::test_login - AssertionError: expected 200 got 401. I fixed this by passing the Authorization header in the test setup at conftest.py line 34."
    label: clean

  - text: "The test suite shows 3 failures: test_cache_miss, test_retry_backoff, test_timeout_handler. These are all in the networking module — fixed the root cause by correcting the mock patch path in tests/conftest.py."
    label: clean

  - text: "All 87 tests pass. The implementation is complete and ready for review. I also added a regression test for the edge case in test_edge_cases.py."
    label: clean

  - text: "I see 3 test failures in the output above — I ran main at commit d4f9a12 and got the same failures, so these are pre-existing and outside this PR scope."
    label: clean

  - text: "build failed: ImportError: cannot import name 'AsyncClient' from 'httpx'. Fixed by upgrading httpx to 0.24.0 in requirements.txt and updating the import in client.py."
    label: clean

  - text: "The linter passes, mypy is clean, and all 54 unit tests pass. One integration test is skipped (requires live DB) — this is expected and documented in the test file header."
    label: clean

  - text: "CI output shows: TypeError: unsupported operand type(s) for +: 'int' and 'str' at processor.py:42. Fixed by casting total to int before the addition."
    label: clean

  - text: "test_webhook_delivery was failing with a 504 timeout. I verified on main (run #8821) the same test fails — it's a known flaky test tracked in issue #204. Not related to this change."
    label: clean

  - text: "All checks pass: 112 tests green, linter clean, type checker clean. The migration file is correctly ordered and the rollback path is tested."
    label: clean

  - text: "The two failing tests were test_rate_limit and test_backoff_delay — both broke because I changed the retry constant. Fixed by updating the expected values in the test assertions to match the new 500ms backoff."
    label: clean
